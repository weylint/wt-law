<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[White Tiger] Constitution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #faf8f4;
      --text: #2a2520;
      --text-muted: #7a7168;
      --accent: #c44d1a;
      --border: #e6e0d6;
      --surface: #ffffff;
      --heading: #1a1510;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Top accent bar */
    body::before {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), #e8784a, var(--accent));
    }

    header {
      max-width: 780px;
      margin: 0 auto;
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 2.4rem;
      color: var(--heading);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    header .meta {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    header .meta .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .source-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      transition: opacity 0.2s;
    }

    .source-link:hover { opacity: 0.7; }

    /* Main content area */
    #doc-content {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .loading .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Style the injected Google Doc content */
    #doc-content h1,
    #doc-content h2,
    #doc-content h3,
    #doc-content h4 {
      font-family: 'Crimson Pro', serif;
      color: var(--heading);
      margin-top: 2.2rem;
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }

    #doc-content h1 { font-size: 2rem; }
    #doc-content h2 { font-size: 1.6rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    #doc-content h3 { font-size: 1.3rem; }
    #doc-content h4 { font-size: 1.1rem; }

    #doc-content p {
      margin-bottom: 1rem;
      font-size: 1.02rem;
    }

    #doc-content ul, #doc-content ol {
      margin-bottom: 1rem;
      padding-left: 1.6rem;
    }

    #doc-content li {
      margin-bottom: 0.4rem;
      font-size: 1.02rem;
    }

    #doc-content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #doc-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.95rem;
    }

    #doc-content th, #doc-content td {
      border: 1px solid var(--border);
      padding: 0.6rem 0.8rem;
      text-align: left;
    }

    #doc-content th {
      background: #f0ebe4;
      font-weight: 600;
    }

    #doc-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1rem 0;
    }

    #doc-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    #doc-content sup {
      vertical-align: super;
      font-size: 0.75em;
      line-height: 0;
    }

    /* Error state */
    .error-msg {
      background: #fef2ef;
      border: 1px solid #f0c6b8;
      border-radius: 8px;
      padding: 1.5rem;
      color: var(--accent);
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .error-msg code {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      word-break: break-all;
    }

    footer {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      header { padding: 2rem 1.2rem 1.5rem; }
      header h1 { font-size: 1.8rem; }
      #doc-content { padding: 1.5rem 1.2rem 3rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>[White Tiger] Constitution</h1>
    <div class="meta">
      <span id="last-updated">Loading...</span>
      <span class="dot"></span>
      <a class="source-link" href="https://docs.google.com/document/d/1Wlbsfthj62koGAXfGN8Fz2SeNWyUGDxlKFA749OZiP0/edit?tab=t.0" target="_blank" rel="noopener">
        View in Google Docs ↗
      </a>
    </div>
  </header>

  <div id="doc-content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading document&hellip;</p>
    </div>
  </div>

  <footer>
    Auto-synced from Google Docs
  </footer>

  <!--
    ============================================================
    HOW THIS WORKS (for the GitHub Actions approach)
    ============================================================

    The JavaScript below fetches content.md on page load
    (client-side fallback). This only works when the page is
    served — not opened as a local file.

    For your GitHub Pages setup, the GitHub Action fetches the
    Google Doc, converts it to Markdown (content.md), and stamps
    the timestamp into the template at BUILD TIME.
  -->
  <script>
    (async () => {
      const container = document.getElementById('doc-content');
      const updatedEl = document.getElementById('last-updated');

      try {
        const res = await fetch('content.md');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        container.innerHTML = marked.parse(text);
        updatedEl.textContent = `Last loaded: ${new Date().toLocaleString()}`;
      } catch (err) {
        container.innerHTML = `
          <div class="error-msg">
            <strong>Could not load the document.</strong><br>
            This page must be served from GitHub Pages or a local server.
            <code>${err.message}</code>
          </div>
        `;
        updatedEl.textContent = 'Failed to load';
      }
    })();
  </script>
</body>
</html>
