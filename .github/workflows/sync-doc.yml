name: Sync Google Doc to GitHub Pages

on:
  # Run every 10 minutes
  schedule:
    - cron: '*/10 * * * *'

  # Also run on manual trigger
  workflow_dispatch:

  # Also run on push to main (so edits to the template deploy too)
  push:
    branches: [main]

# Grant write permission so the action can push to gh-pages
permissions:
  contents: write
  pages: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch Google Doc and build page
        run: python build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true
